name: Bump All Tap Formulas

on:
  schedule:
    - cron: "0 6 * * *" # daily
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-taps:
    runs-on: ubuntu-latest
    env:
      HOMEBREW_SIMULATE_MACOS_ON_LINUX: 1
    steps:
      - name: Check and bump all formulas
        uses: dawidd6/action-homebrew-bump-formula@v3
        with:
          # Required: A Personal Access Token (PAT) with `public_repo` scope
          #token: ${{ secrets.TAP_GITHUB_TOKEN }}
          token: ${{ secrets.GITHUB_TOKEN }}

          # Tell the action to look at your tap
          tap: synkathairo/repo

          # Enable livecheck mode to sweep the entire repository
          livecheck: true

          # Open individual Pull Requests for outdated formulae so tests.yml can
          # build bottle artifacts and publish.yml can pull them with pr-pull.
          force: false

          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
